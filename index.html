<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript Concepts</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body class="main-box">
    <div class="dark-class">
      <button id="darkModeButton">Toggle Dark Mode</button>
    </div>
    <div class="app-card">
      <h1 class="heading">To-DO App with DOM Events</h1>
      <div class="input-row">
        <input placeholder="Write your task" id="userInput" />
        <button id="createButton">Add task</button>
      </div>
      <ul id="todoList"></ul>
    </div>
    <script src="app.js"></script>
    <script src="darkMode.js"></script>
  </body>
</html>
